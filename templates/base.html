<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin</title>

  <!-- Bootstrap + Icons CSS only -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    /* Your common styles here (copy the CSS from your pages) */
    /* Reset & basics */
    body, html {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #e7ebf0;
      color: #2a2a2a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .app {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
      gap: 1rem;
    }
    .sidebar {
      background: #fefefe;
      border-radius: 1rem;
      box-shadow:
        1px 1px 3px rgb(0 0 0 / 0.1),
        -1px -1px 3px rgb(255 255 255 / 0.7);
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      user-select: none;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      font-weight: 600;
      color: #05445E;
      user-select: text;
    }
    .brand .small.muted {
      color: #607D8B;
      font-weight: 500;
      opacity: 0.8;
    }
    .sidebar .nav-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      border-radius: 0.6rem;
      font-weight: 600;
      color: #4a4a4a;
      text-decoration: none;
      margin-bottom: 0.3rem;
      transition: background-color 0.3s, color 0.3s;
    }
    .sidebar .nav-link i {
      font-size: 1.2rem;
      line-height: 1;
    }
    .sidebar .nav-link:hover {
      background-color: #d6e4f0;
      color: #05445E;
    }
    .sidebar .nav-link.active {
      background-color: #05445E;
      color: white;
    }
    .sidebar .mt-4.small.muted {
      text-align: center;
      font-size: 0.8rem;
      color: #a0a0a0;
      user-select: text;
    }
    .main {
      display: flex;
      flex-direction: column;
      padding: 1rem 2rem;
      background: #fefefe;
      border-radius: 1rem;
      box-shadow:
        2px 2px 5px rgb(0 0 0 / 0.07),
        -2px -2px 5px rgb(255 255 255 / 0.7);
    }
    @media (max-width: 991px) {
      .app {
        grid-template-columns: 1fr;
      }
      .sidebar {
        grid-row: 1;
        grid-column: 1;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      .main {
        grid-row: 2;
        grid-column: 1;
        padding: 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="app">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="d-flex align-items-center justify-content-between mb-3">
          <div class="brand">
            <i class="bi bi-shop fs-4" style="color: #05445E"></i>
            <div>
              <div style="font-size:1rem">Grocery<span class="small muted"> • Admin</span></div>
              <div class="small muted">Management</div>
            </div>
          </div>
        </div>

        <div id="sideLinks" class="d-lg-block">
          <a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
          <a class="nav-link" href="{{ url_for('products') }}"><i class="bi bi-box-seam"></i> Products</a>
          <a class="nav-link" href="{{ url_for('customers') }}"><i class="bi bi-people"></i> Customers</a>
          <a class="nav-link" href="{{ url_for('orders') }}"><i class="bi bi-journal-text"></i> Orders</a>
          <a class="nav-link" href="{{ url_for('settings') }}"><i class="bi bi-gear"></i> Settings</a>
        </div>

        <div class="mt-4 small muted">© {{ current_year if current_year else '' }}</div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        {% block content %}
        <!-- Put all page-specific content here -->
        {% endblock %}
      </main>

    </div>
  </div>

</body>
</html>
